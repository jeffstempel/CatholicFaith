    <div class="container">
        <div class="row"><h2 style="text-align: center;"> Is Today An Ember Day?</h2>
            <div class="col-sm">
                <h1 id="emberDayYesNo" style="text-align: center;">NO!</h1>
                <p id="emberDayDesc" style="text-align: center;"></p>

    <div class="container">

            </div>

                <h1 id="solemnityNovusOrdoYesNo" style="text-align: center;">NO!</h1>

            </div>
        </div>
    </div>
    <div class="container">
        <div class="row"><h2 style="text-align: center;">Saint of the Day</h2>
            <div class="col sm">
                <h1 id="saintOld" style="text-align: center;">St. Mary Margaret Alacoque</h1>
            </div>
            <div class="col sm">
                <h1 id="saintNew" style="text-align: center;">St. Ignatius of Antioch</h1>
            </div>
        </div>
    </div>
